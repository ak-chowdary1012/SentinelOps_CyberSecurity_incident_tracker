services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinelops
      POSTGRES_USER: sentinelops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinelops_dev_password_change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinelops -d sentinelops"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql+psycopg2://sentinelops:${POSTGRES_PASSWORD:-sentinelops_dev_password_change_me}@db:5432/sentinelops
      CORS_ORIGINS: "http://127.0.0.1:8000,http://localhost:8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
